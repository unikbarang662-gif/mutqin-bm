<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutqin BM - Standar Kelulusan Ponpes Bahrul Maghfiroh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #0d1b2a; --gold: #d4a037; --gold-light: #f0c040; --green-dark: #0d4a2a; --green: #1a6b3c; --green-light: #2d8a5a; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: #e0e0e0; min-height: 100vh; }
        .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: linear-gradient(145deg, rgba(13,27,42,0.98), rgba(10,30,50,0.95)); border: 2px solid rgba(212,160,55,0.5); border-radius: 20px; max-width: 480px; width: 100%; padding: 40px 35px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
        .login-box h2 { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 22px; margin-top: 20px; margin-bottom: 25px; }
        .login-box .form-group { margin-bottom: 16px; text-align: left; }
        .login-box label { color: #aaa; font-size: 13px; margin-bottom: 5px; display: block; }
        .login-box input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06); border: 2px solid rgba(212,160,55,0.3); border-radius: 10px; color: #fff; font-size: 14px; outline: none; transition: 0.3s; }
        .login-box input:focus { border-color: var(--gold); box-shadow: 0 0 10px rgba(212,160,55,0.2); }
        .login-box input::placeholder { color: #666; }
        .login-btn { width: 100%; padding: 13px; background: linear-gradient(135deg, var(--green-dark), var(--green)); border: 2px solid var(--gold); border-radius: 10px; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; font-family: 'Poppins', sans-serif; }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,160,55,0.3); }

        .app-container { display: none; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #0a1a2e, #0d2840); border-right: 2px solid rgba(212,160,55,0.3); position: fixed; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 20px; text-align: center; border-bottom: 2px solid rgba(212,160,55,0.2); }
        .sidebar-header h2 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 20px; margin-top: 8px; }
        .sidebar-header p { color: #888; font-size: 9px; letter-spacing: 1px; }
        .nav-menu { padding: 15px 0; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: #888; cursor: pointer; font-size: 13px; margin: 3px 10px; border-radius: 8px; transition: 0.3s; }
        .nav-item:hover, .nav-item.active { background: rgba(212,160,55,0.12); color: var(--gold); }
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 15px 20px; border-top: 2px solid rgba(212,160,55,0.2); }
        .btn-logout { width: 100%; padding: 10px; background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #fca5a5; border-radius: 8px; cursor: pointer; font-size: 13px; }

        .main-content { margin-left: 260px; padding: 25px; }
        .page { display: none; } .page.active { display: block; }
        .page-header { background: linear-gradient(135deg, rgba(13,74,42,0.5), rgba(10,30,50,0.8)); border: 2px solid rgba(212,160,55,0.3); border-radius: 12px; padding: 20px 25px; margin-bottom: 22px; display: flex; justify-content: space-between; align-items: center; }
        .page-header h1 { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 22px; }
        .page-header p { color: #888; font-size: 12px; margin-top: 3px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, rgba(13,74,42,0.4), rgba(10,30,50,0.6)); border: 2px solid; border-radius: 12px; padding: 18px; display: flex; align-items: center; gap: 14px; }
        .stat-card.total { border-color: #10b981; } .stat-card.lulus { border-color: #3b82f6; } .stat-card.proses { border-color: #f59e0b; }
        .stat-icon { width: 50px; height: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        .stat-card.total .stat-icon { background: rgba(16,185,129,0.2); color: #10b981; }
        .stat-card.lulus .stat-icon { background: rgba(59,130,246,0.2); color: #3b82f6; }
        .stat-card.proses .stat-icon { background: rgba(245,158,11,0.2); color: #f59e0b; }
        .stat-content h3 { color: #888; font-size: 11px; margin-bottom: 3px; }
        .stat-number { font-size: 28px; font-weight: bold; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 18px; }
        .card { background: linear-gradient(135deg, rgba(13,74,42,0.4), rgba(10,30,50,0.6)); border: 2px solid rgba(212,160,55,0.25); border-radius: 12px; overflow: hidden; }
        .card-header { padding: 15px 18px; border-bottom: 2px solid rgba(212,160,55,0.2); display: flex; justify-content: space-between; align-items: center; }
        .card-header h3 { color: var(--gold); font-size: 14px; }
        .card-body { padding: 18px; }
        .chart-container { height: 230px; position: relative; }

        .btn { padding: 8px 16px; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
        .btn-primary { background: linear-gradient(135deg, var(--green-dark), var(--green)); border: 2px solid var(--gold); color: #fff; }
        .btn-sm { padding: 5px 10px; font-size: 10px; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-box input { padding: 10px 14px; background: rgba(255,255,255,0.06); border: 2px solid rgba(212,160,55,0.25); border-radius: 10px; color: #fff; font-size: 12px; outline: none; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: linear-gradient(135deg, #0d2840, #0a1a2e); border: 2px solid var(--gold); border-radius: 14px; max-width: 580px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 2px solid rgba(212,160,55,0.2); display: flex; justify-content: space-between; }
        .modal-header h3 { color: var(--gold); font-size: 16px; }
        .modal-close { background: none; border: none; color: #888; font-size: 22px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 14px 20px; border-top: 2px solid rgba(212,160,55,0.2); display: flex; justify-content: flex-end; gap: 10px; }

        .toast-container { position: fixed; top: 20px; right: 20px; z-index: 3000; }
        .toast { padding: 12px 20px; border-radius: 10px; color: #fff; margin-bottom: 10px; box-shadow: 0 8px 25px rgba(0,0,0,0.3); font-size: 13px; }
        .toast-success { background: linear-gradient(135deg, #10b981, #059669); }
        .toast-error { background: linear-gradient(135deg, #ef4444, #dc2626); }

        .cert-page-container { max-width: 900px; margin: 0 auto; }
        .certificate-wrapper { background: #f5f0e1; border: 8px solid #c9a84c; border-radius: 4px; padding: 8px; }
        .certificate-border-inner { border: 3px solid #c9a84c; padding: 40px 45px; position: relative; background: #f5f0e1; }
        .cert-corner-ornament { position: absolute; width: 40px; height: 40px; font-size: 24px; color: #c9a84c; opacity: 0.5; }
        .cert-corner-ornament.tl { top: 8px; left: 8px; } .cert-corner-ornament.tr { top: 8px; right: 8px; }
        .cert-corner-ornament.bl { bottom: 8px; left: 8px; } .cert-corner-ornament.br { bottom: 8px; right: 8px; }
        .cert-top-section { text-align: center; margin-bottom: 18px; }
        .cert-ponpes-name { font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; color: #1a4731; letter-spacing: 2px; margin-bottom: 5px; }
        .cert-title-main { font-family: 'Playfair Display', serif; font-size: 36px; font-weight: 800; color: #1a4731; }
        .cert-decorative-line { width: 180px; height: 2px; background: linear-gradient(90deg, transparent, #c9a84c, transparent); margin: 8px auto; }
        .cert-name-main { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: #1a2e1a; text-align: center; margin: 16px 0 8px; }
        .cert-desc-text { text-align: center; font-size: 12px; color: #555; line-height: 1.8; margin: 10px 0; }
        .cert-lulus-badge { text-align: center; margin: 16px 0; }
        .cert-lulus-badge .badge-inner { display: inline-block; background: linear-gradient(135deg, #1a4731, #2d6a4f); color: #f4d03f; padding: 8px 45px; font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; letter-spacing: 5px; border-radius: 6px; border: 2px solid #c9a84c; }
        .cert-hafalan-table { width: 100%; margin: 18px 0; border-collapse: separate; border-spacing: 0 5px; }
        .cert-hafalan-table td { padding: 7px 10px; border: none; color: #333; font-size: 11px; }
        .cert-hafalan-table .haf-check { width: 26px; text-align: center; }
        .cert-grade-pill { display: inline-block; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: 600; color: #fff; }
        .grade-mumtaz { background: linear-gradient(135deg, #c9a84c, #e8d48b); color: #1a4731; }
        .grade-jayyid-jiddan { background: linear-gradient(135deg, #1a4731, #2d6a4f); }
        .grade-jayyid { background: #2d6a4f; } .grade-ahsan { background: #3d8b6a; }
        .cert-check-small { display: inline-flex; width: 20px; height: 20px; background: #1a4731; color: #f4d03f; border-radius: 3px; align-items: center; justify-content: center; font-size: 11px; margin-left: 3px; }
        .cert-signatures { display: flex; justify-content: space-between; margin-top: 35px; padding: 0 25px; }
        .cert-sig-block { text-align: center; min-width: 180px; }
        .cert-sig-line { width: 170px; border-bottom: 1px solid #1a4731; margin: 0 auto 5px; }
        .cert-sig-name { font-size: 10px; font-weight: 600; color: #1a4731; }
        .cert-sig-title { font-size: 9px; color: #666; }
        .cert-number-top { position: absolute; top: 14px; right: 22px; font-size: 10px; color: #888; }

        @media print { body * { visibility: hidden; } #printArea, #printArea * { visibility: visible; } #printArea { position: absolute; left: 0; top: 0; width: 100%; } }
        @media(max-width: 768px) { .sidebar { display: none; } .main-content { margin-left: 0; } .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
