<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mutqin BM - Sistem Standar Kelulusan Ponpes Bahrul Maghfiroh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f4f0;
            font-family: 'Poppins', 'Segoe UI', system-ui, sans-serif;
        }
        /* Navbar Hijau */
        .navbar {
            background: #1a472a !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .navbar-brand {
            color: #ffd966 !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .navbar-brand i { margin-right: 8px; }
        .nav-link-custom {
            color: white !important;
            margin: 0 8px;
            font-weight: 500;
            transition: 0.3s;
        }
        .nav-link-custom:hover {
            color: #ffd966 !important;
            transform: translateY(-2px);
        }
        /* Card Style */
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            margin-bottom: 25px;
            overflow: hidden;
        }
        .card-header {
            background: #2d6a4f;
            color: white;
            font-weight: bold;
            padding: 15px 20px;
            border: none;
        }
        .btn-mutqin {
            background: #2d6a4f;
            color: white;
            border-radius: 40px;
            padding: 10px 25px;
            font-weight: bold;
            border: none;
            transition: 0.3s;
        }
        .btn-mutqin:hover {
            background: #1b4d3a;
            color: #ffd966;
        }
        .btn-outline-mutqin {
            border: 2px solid #2d6a4f;
            color: #2d6a4f;
            border-radius: 40px;
            font-weight: bold;
            background: white;
        }
        /* Stat Card */
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-card i { font-size: 2.5rem; color: #2d6a4f; }
        .stat-card h2 { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .stat-card.bg-success { background: #2d6a4f; }
        .stat-card.bg-success i, .stat-card.bg-success h2, .stat-card.bg-success p { color: white; }
        .stat-card.bg-warning { background: #ffc107; }
        .stat-card.bg-secondary { background: #6c757d; }
        .stat-card.bg-secondary i, .stat-card.bg-secondary h2, .stat-card.bg-secondary p { color: white; }
        /* Login Card */
        .login-card {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 450px;
            margin: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .logo-area {
            background: #2d6a4f;
            padding: 30px;
            text-align: center;
            color: #ffd966;
        }
        .logo-area h1 { font-size: 2rem; font-weight: bold; font-family: 'Times New Roman', serif; }
        .logo-area p { color: white; }
        /* Progress Bar */
        .progress { height: 28px; border-radius: 20px; background: #e0e0e0; }
        .progress-bar { background: #2d6a4f; border-radius: 20px; font-weight: bold; }
        /* Table */
        .table thead th { background: #e8f5e9; color: #1a472a; font-weight: bold; }
        .table-bordered { border-radius: 15px; overflow: hidden; }
        /* Sertifikat */
        .sertifikat-desain {
            background: #fef7e0;
            border: 15px solid #b8860b;
            border-radius: 20px;
            padding: 30px;
            font-family: 'Times New Roman', serif;
            max-width: 800px;
            margin: auto;
        }
        .footer {
            background: #1a472a;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
        @media (max-width: 768px) {
            .stat-card h2 { font-size: 1.3rem; }
            .stat-card i { font-size: 1.8rem; }
            .card-header { font-size: 0.9rem; }
        }
        .modal-content { border-radius: 25px; }
        .form-label { font-weight: 500; }
        table.dataTable { width: 100%; }
        .badge-lulus { background: #2d6a4f; padding: 5px 12px; border-radius: 20px; }
        .badge-proses { background: #ffc107; color: #1a472a; padding: 5px 12px; border-radius: 20px; }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="#" onclick="changePage('dashboard')">
            <i class="bi bi-mortarboard-fill"></i> Mutqin BM
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">

        </div>
    </div>
</nav>

<!-- MAIN CONTENT -->
<div class="container mt-3 pb-5" id="mainContainer">
    <div id="pageContent"></div>
</div>

<div class="footer">
    <i class="bi bi-building"></i> © 2026 Mutqin BM - Ponpes Bahrul Maghfiroh | Sistem Standar Kelulusan
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ======================== DATABASE (LocalStorage) ========================
let currentUser = null;

// Data Santri (Sesuai Contoh Gambar)
let santriData = [
    { id: 1, nis: "001", nama: "Ahmad Fauzan", kelas: "Kelas 5", wali: "Bapak Ahmad", gender: "L", foto: "", status_lulus: true, progress: 94 },
    { id: 2, nis: "002", nama: "Salma Azizah", kelas: "Kelas 4", wali: "Ibu Salma", gender: "P", foto: "", status_lulus: false, progress: 68 },
    { id: 3, nis: "003", nama: "Mohammad Luqman", kelas: "Kelas 2", wali: "Bapak Luqman", gender: "L", foto: "", status_lulus: false, progress: 45 },
    { id: 4, nis: "004", nama: "Yusuf Ramadhan", kelas: "Kelas 6", wali: "Bapak Yusuf", gender: "L", foto: "", status_lulus: false, progress: 30 },
    { id: 5, nis: "005", nama: "M. Faris", kelas: "Kelas 5", wali: "Ibu Faris", gender: "L", foto: "", status_lulus: false, progress: 72 },
    { id: 6, nis: "006", nama: "Waisin", kelas: "Kelas 3", wali: "-", gender: "L", foto: "", status_lulus: false, progress: 51 },
    { id: 7, nis: "007", nama: "Magilah", kelas: "Kelas 3", wali: "-", gender: "P", foto: "", status_lulus: false, progress: 51 },
    { id: 8, nis: "008", nama: "Monalisa", kelas: "Kelas 4", wali: "-", gender: "P", foto: "", status_lulus: false, progress: 51 }
];

// Data Hafalan Detail
let hafalanDetail = {};

function initData() {
    if(localStorage.getItem('mutqin_santri_final')) {
        santriData = JSON.parse(localStorage.getItem('mutqin_santri_final'));
    }
    if(localStorage.getItem('mutqin_hafalan_final')) {
        hafalanDetail = JSON.parse(localStorage.getItem('mutqin_hafalan_final'));
    } else {
        // Inisialisasi data hafalan default sesuai contoh
        santriData.forEach(s => {
            hafalanDetail[s.id] = {
                // Hafalan Surat Pilihan
                surah_yasin: { nilai: s.id==1 ? "Mumtaz" : "Jayyid", selesai: s.id==1 },
                surah_waqiah: { nilai: s.id==1 ? "Jayyid Jiddan" : "Jayyid", selesai: s.id==1 },
                surah_mulk: { nilai: s.id==1 ? "Jayyid" : "Jayyid", selesai: s.id==1 },
                // Hafalan Aurad
                aurad_wirid: s.id==1 ? "Mumtaz" : "Jayyid",
                aurad_doa: s.id==1 ? "Mumtaz" : "Jayyid",
                aurad_tahlil_ringkas: s.id==1 ? "Mumtaz" : "Jayyid",
                aurad_tahlil_lengkap: s.id==1 ? "Mumtaz" : "Jayyid",
                aurad_doa_tahlil: s.id==1 ? "Mumtaz" : "Jayyid",
                // Praktek Ibadah
                praktek_jenazah: s.id==1 ? "Mumtaz" : "Jayyid",
                praktek_khotib: s.id==1 ? "Mumtaz" : "Jayyid",
                // Juz 30 (per surat)
                juz30: {},
                // Madin & Adab
                madin_ula: s.id==1,
                madin_wustho: s.id==1,
                adab_sikap: s.id==1
            };
            // Inisialisasi Juz 30
            let suratJuz30 = ["An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insyiqaq","Al-Buruj","At-Thariq","Al-A'la","Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Dhuha","Al-Insyirah","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takasur","Al-Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kautsar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"];
            suratJuz30.forEach(surat => {
                hafalanDetail[s.id].juz30[surat] = s.id==1 ? "Ahsan" : "Jayyid";
            });
        });
        saveData();
    }
    updateAllProgress();
}

function saveData() {
    localStorage.setItem('mutqin_santri_final', JSON.stringify(santriData));
    localStorage.setItem('mutqin_hafalan_final', JSON.stringify(hafalanDetail));
}

function hitungProgressSantri(id) {
    let h = hafalanDetail[id];
    if(!h) return 0;
    let total = 0;
    let max = 0;
    
    // Surah (max 30)
    if(h.surah_yasin.selesai) total += 10;
    if(h.surah_waqiah.selesai) total += 10;
    if(h.surah_mulk.selesai) total += 10;
    max += 30;
    
    // Aurad (max 25)
    let auradValues = { "Mumtaz":5, "Jayyid Jiddan":4, "Jayyid":3, "Ahsan":2 };
    total += auradValues[h.aurad_wirid] || 3;
    total += auradValues[h.aurad_doa] || 3;
    total += auradValues[h.aurad_tahlil_ringkas] || 3;
    total += auradValues[h.aurad_tahlil_lengkap] || 3;
    total += auradValues[h.aurad_doa_tahlil] || 3;
    max += 25;
    
    // Praktek (max 15)
    total += auradValues[h.praktek_jenazah] || 3;
    total += auradValues[h.praktek_khotib] || 3;
    max += 15;
    
    // Juz 30 (max 20)
    let juzTotal = 0, juzCount = 0;
    for(let s in h.juz30) {
        juzTotal += auradValues[h.juz30[s]] || 3;
        juzCount++;
    }
    total += (juzTotal / juzCount) * 4;
    max += 20;
    
    // Madin & Adab (max 10)
    if(h.madin_ula) total += 3;
    if(h.madin_wustho) total += 3;
    if(h.adab_sikap) total += 4;
    max += 10;
    
    return Math.min(100, Math.round((total/max)*100));
}

function updateAllProgress() {
    santriData.forEach(s => {
        s.progress = hitungProgressSantri(s.id);
        s.status_lulus = s.progress >= 75;
    });
    saveData();
}

// ======================== RENDER FUNCTIONS ========================
let currentPage = 'login';
let chart1, chart2;

function render() {
    if(!currentUser && currentPage !== 'login') {
        currentPage = 'login';
    }
    if(currentPage === 'login') renderLogin();
    else if(currentPage === 'dashboard') renderDashboard();
    else if(currentPage === 'santri') renderSantri();
    else if(currentPage === 'hafalan') renderHafalan();
    else if(currentPage === 'sertifikat') renderSertifikat();
    else if(currentPage === 'upload') renderUpload();
    renderNavbar();
}

function renderNavbar() {
    let nav = document.getElementById('navMenu');
    if(!currentUser) {
        nav.innerHTML = '';
        return;
    }
    nav.innerHTML = `
        <li class="nav-item"><a class="nav-link nav-link-custom" href="#" onclick="changePage('dashboard')"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom" href="#" onclick="changePage('santri')"><i class="bi bi-people"></i> Data Santri</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom" href="#" onclick="changePage('hafalan')"><i class="bi bi-book"></i> Input Hafalan</a></li>
        <li class="nav-item"><a class="nav-link nav-link-custom" href="#" onclick="changePage('sertifikat')"><i class="bi bi-award"></i> Sertifikat</a></li>
        ${currentUser.role === 'admin' ? '<li class="nav-item"><a class="nav-link nav-link-custom" href="#" onclick="changePage(\'upload\')"><i class="bi bi-upload"></i> Upload Excel</a></li>' : ''}
        <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
        <li class="nav-item"><span class="nav-link text-warning"><i class="bi bi-person-circle"></i> ${currentUser.username}</span></li>
    `;
}

function changePage(page) {
    currentPage = page;
    render();
}

function logout() {
    currentUser = null;
    changePage('login');
}

// LOGIN
function renderLogin() {
    document.getElementById('pageContent').innerHTML = `
        <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
            <div class="col-md-5 col-11">
                <div class="login-card">
                    <div class="logo-area">
                        <i class="bi bi-building fs-1"></i>
                        <h3>PONDOK PESANTREN</h3>
                        <h1>BAHRUL MAGHFIROH</h1>
                        <hr style="background: #ffd966;">
                        <h1>Mutqin BM</h1>
                        <p>Standar Kelulusan Ponpes Bahrul Maghfiroh</p>
                    </div>
                    <div class="p-4">
                        <h5 class="text-center mb-4">🔐 Login</h5>
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" id="loginUser" class="form-control" placeholder="admin / ustadz">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" id="loginPass" class="form-control" placeholder="password">
                        </div>
                        <button class="btn btn-mutqin w-100" onclick="doLogin()">Login</button>
                        <div class="text-center mt-3 small text-muted">
                            <i class="bi bi-info-circle"></i> Demo: <strong>admin</strong> / admin | <strong>ustadz</strong> / ustadz
                        </div>
                        <div class="text-center mt-2"><a href="#" class="text-muted small">Lupa Password?</a></div>
                    </div>
                </div>
            </div>
        </div>
    `;
}

function doLogin() {
    let user = document.getElementById('loginUser').value;
    let pass = document.getElementById('loginPass').value;
    if(user === 'admin' && pass === 'admin') currentUser = { username: 'admin', role: 'admin' };
    else if(user === 'ustadz' && pass === 'ustadz') currentUser = { username: 'ustadz', role: 'asatidz' };
    else { alert("Login gagal! Gunakan admin/admin atau ustadz/ustadz"); return; }
    changePage('dashboard');
}

// DASHBOARD
function renderDashboard() {
    updateAllProgress();
    let total = santriData.length;
    let lulus = santriData.filter(s => s.status_lulus).length;
    let proses = santriData.filter(s => !s.status_lulus && s.progress > 40).length;
    let belum = santriData.filter(s => s.progress <= 40).length;
    let topSantri = [...santriData].sort((a,b)=>b.progress - a.progress).slice(0,5);
    
    document.getElementById('pageContent').innerHTML = `
        <div class="row g-3 mb-4">
            <div class="col-md-3 col-6"><div class="stat-card"><i class="bi bi-people"></i><h2>${total}</h2><p>Total Santri</p></div></div>
            <div class="col-md-3 col-6"><div class="stat-card bg-success"><i class="bi bi-check-circle"></i><h2>${lulus}</h2><p>Sudah Lulus</p></div></div>
            <div class="col-md-3 col-6"><div class="stat-card bg-warning"><i class="bi bi-hourglass-split"></i><h2>${proses}</h2><p>Sedang Proses</p></div></div>
            <div class="col-md-3 col-6"><div class="stat-card bg-secondary"><i class="bi bi-clock-history"></i><h2>${belum}</h2><p>Belum Lulus</p></div></div>
        </div>
        <div class="row">
            <div class="col-md-6"><div class="card"><div class="card-header"><i class="bi bi-bar-chart-steps"></i> Progress Hafalan Santri (Top 5)</div><div class="card-body"><canvas id="progressChart"></canvas></div></div></div>
            <div class="col-md-6"><div class="card"><div class="card-header"><i class="bi bi-pie-chart"></i> Status Kelulusan</div><div class="card-body"><canvas id="statusChart"></canvas></div></div></div>
        </div>
        <div class="card"><div class="card-header"><i class="bi bi-table"></i> Rekap Presentasi Santri</div><div class="card-body table-responsive"><table class="table table-bordered table-hover"><thead><tr><th>Nama Santri</th><th>Kelas</th><th>Progress Hafalan</th><th>Status</th><th>Aksi</th></tr></thead><tbody>
            ${santriData.map(s => `<tr><td><i class="bi bi-person-badge"></i> ${s.nama}</td><td>${s.kelas}</td><td><div class="progress"><div class="progress-bar" style="width:${s.progress}%">${s.progress}%</div></div></td><td>${s.status_lulus ? '<span class="badge bg-success">✅ LULUS</span>' : '<span class="badge bg-warning text-dark">🔄 PROSES</span>'}</td><td>${s.status_lulus ? `<button class="btn btn-sm btn-success" onclick="cetakSertifikatById(${s.id})"><i class="bi bi-printer"></i> Cetak Sertifikat</button>` : '-'}</td></tr>`).join('')}
        </tbody></table></div></div>
    `;
    
    setTimeout(() => {
        if(chart1) chart1.destroy();
        if(chart2) chart2.destroy();
        let ctx1 = document.getElementById('progressChart')?.getContext('2d');
        let ctx2 = document.getElementById('statusChart')?.getContext('2d');
        if(ctx1) chart1 = new Chart(ctx1, { type: 'bar', data: { labels: topSantri.map(s=>s.nama), datasets: [{ label: 'Progress (%)', data: topSantri.map(s=>s.progress), backgroundColor: '#2d6a4f', borderRadius: 10 }] } });
        if(ctx2) chart2 = new Chart(ctx2, { type: 'pie', data: { labels: ['Lulus', 'Proses', 'Belum Lulus'], datasets: [{ data: [lulus, proses, belum], backgroundColor: ['#2d6a4f', '#ffc107', '#6c757d'] }] } });
    }, 100);
}

// DATA SANTRI
function renderSantri() {
    document.getElementById('pageContent').innerHTML = `
        <div class="card"><div class="card-header"><i class="bi bi-database"></i> Data Santri <button class="btn btn-sm btn-light float-end" onclick="tambahSantri()"><i class="bi bi-plus-circle"></i> Tambah Santri</button></div>
        <div class="card-body table-responsive"><table class="table table-bordered table-hover"><thead><tr><th>NIS</th><th>Nama</th><th>Kelas</th><th>Wali</th><th>Progress</th><th>Status</th><th>Aksi</th></tr></thead><tbody>
            ${santriData.map(s => `<tr><td>${s.nis}</td><td><strong>${s.nama}</strong></td><td>${s.kelas}</td><td>${s.wali || '-'}</td><td><div class="progress" style="height:20px"><div class="progress-bar" style="width:${s.progress}%">${s.progress}%</div></div></td><td>${s.status_lulus ? '<span class="badge bg-success">Lulus</span>' : '<span class="badge bg-warning text-dark">Proses</span>'}</td><td><button class="btn btn-sm btn-primary mb-1" onclick="editSantri(${s.id})"><i class="bi bi-pencil"></i> Edit</button> <button class="btn btn-sm btn-danger" onclick="hapusSantri(${s.id})"><i class="bi bi-trash"></i> Hapus</button> ${s.status_lulus ? `<button class="btn btn-sm btn-success" onclick="cetakSertifikatById(${s.id})"><i class="bi bi-award"></i> Sertifikat</button>` : ''}</td></tr>`).join('')}
        </tbody></table></div></div>
    `;
}

function tambahSantri() {
    let nama = prompt("Masukkan Nama Santri:");
    if(!nama) return;
    let kelas = prompt("Masukkan Kelas:");
    let newId = Math.max(...santriData.map(s=>s.id), 0) + 1;
    santriData.push({ id: newId, nis: "BM"+newId, nama, kelas, wali: "-", gender: "L", progress: 0, status_lulus: false });
    
    // Inisialisasi hafalan default
    hafalanDetail[newId] = {
        surah_yasin: { nilai: "Jayyid", selesai: false },
        surah_waqiah: { nilai: "Jayyid", selesai: false },
        surah_mulk: { nilai: "Jayyid", selesai: false },
        aurad_wirid: "Jayyid", aurad_doa: "Jayyid", aurad_tahlil_ringkas: "Jayyid", aurad_tahlil_lengkap: "Jayyid", aurad_doa_tahlil: "Jayyid",
        praktek_jenazah: "Jayyid", praktek_khotib: "Jayyid",
        juz30: {},
        madin_ula: false, madin_wustho: false, adab_sikap: false
    };
    let suratJuz30 = ["An-Naba","An-Nazi'at","Abasa","At-Takwir","Al-Infitar","Al-Mutaffifin","Al-Insyiqaq","Al-Buruj","At-Thariq","Al-A'la","Al-Ghasyiyah","Al-Fajr","Al-Balad","Asy-Syams","Al-Lail","Ad-Dhuha","Al-Insyirah","At-Tin","Al-Alaq","Al-Qadr","Al-Bayyinah","Az-Zalzalah","Al-Adiyat","Al-Qari'ah","At-Takasur","Al-Asr","Al-Humazah","Al-Fil","Quraisy","Al-Ma'un","Al-Kautsar","Al-Kafirun","An-Nasr","Al-Lahab","Al-Ikhlas","Al-Falaq","An-Nas"];
    suratJuz30.forEach(surat => { hafalanDetail[newId].juz30[surat] = "Jayyid"; });
    
    updateAllProgress();
    saveData();
    renderSantri();
}

function hapusSantri(id) {
    if(confirm("Yakin hapus santri ini?")) {
        santriData = santriData.filter(s => s.id !== id);
        delete hafalanDetail[id];
        saveData();
        renderSantri();
    }
}
