<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mutqin BM - Manajemen Kelulusan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .toast { position: fixed; bottom: 20px; right: 20px; z-index: 9999; padding: 12px 20px; border-radius: 10px; font-weight: 600; font-size: 13px; animation: fadeIn 0.3s; }
        .toast-success { background: #10b981; color: white; }
        .toast-error { background: #ef4444; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .nav-item { padding: 10px 16px; margin: 4px 8px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background: #10b981; color: white; }
        .nav-item:hover:not(.active) { background: #d1fae5; }
        .btn-primary { background: #10b981; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: none; }
        .btn-outline { background: white; border: 1px solid #d1d5db; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .modal-content { background: white; border-radius: 16px; max-width: 500px; width: 90%; max-height: 80vh; overflow: auto; }
        .badge-success { background: #d1fae5; color: #065f46; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-warning { background: #fed7aa; color: #9a3412; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-danger { background: #fee2e2; color: #991b1b; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .progress-bar { height: 6px; background: #e5e7eb; border-radius: 10px; width: 80px; overflow: hidden; }
        .progress-fill { height: 100%; background: #10b981; border-radius: 10px; }
        input, select { border: 1px solid #d1d5db; border-radius: 8px; padding: 8px 12px; outline: none; }
        input:focus, select:focus { border-color: #10b981; }
    </style>
</head>
<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginScreen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-900 to-gray-700">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4">
        <div class="text-center mb-6">
            <i class="fas fa-graduation-cap text-emerald-600 text-5xl mb-3"></i>
            <h1 class="text-2xl font-bold">Mutqin BM</h1>
            <p class="text-gray-500 text-sm">Sistem Manajemen Kelulusan</p>
        </div>
        <input type="text" id="loginUser" placeholder="Username" class="w-full mb-3">
        <input type="password" id="loginPass" placeholder="Password" class="w-full mb-4">
        <button onclick="doLogin()" class="btn-primary w-full py-2">Masuk</button>
        <p class="text-xs text-gray-400 text-center mt-4">User: admin / Password: admin123</p>
    </div>
</div>

<!-- MAIN APP -->
<div id="mainApp" class="hidden">
    <!-- Header -->
    <div class="bg-white shadow-sm px-4 py-3 flex justify-between items-center sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <i class="fas fa-graduation-cap text-emerald-600 text-xl"></i>
            <h1 class="font-bold">Mutqin BM</h1>
        </div>
        <div class="flex items-center gap-3">
            <span id="userRole" class="text-sm bg-gray-100 px-3 py-1 rounded-full">Admin</span>
            <button onclick="doLogout()" class="text-red-500 text-sm"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>

    <div class="flex">
        <!-- Sidebar -->
        <div class="w-64 bg-white min-h-screen shadow-sm">
            <nav class="py-4">
                <div class="nav-item" onclick="showPage('dashboard')"><i class="fas fa-chart-line w-5"></i> Dashboard</div>
                <div class="nav-item" onclick="showPage('santri')"><i class="fas fa-users w-5"></i> Data Santri</div>
                <div class="nav-item" onclick="showPage('hafalan')"><i class="fas fa-book-open w-5"></i> Hafalan</div>
                <div class="nav-item" onclick="showPage('sertifikat')"><i class="fas fa-certificate w-5"></i> Sertifikat</div>
                <div class="nav-item" onclick="showPage('profil')"><i class="fas fa-building w-5"></i> Profil</div>
            </nav>
        </div>

        <!-- Content -->
        <div class="flex-1 p-6">
            <!-- DASHBOARD -->
            <div id="pageDashboard" class="page">
                <h2 class="text-2xl font-bold mb-6">Dashboard</h2>
                <div class="grid grid-cols-4 gap-4 mb-6">
                    <div class="bg-blue-500 text-white p-4 rounded-xl"><div class="text-2xl font-bold" id="totalSantri">0</div><div>Total Santri</div></div>
                    <div class="bg-green-500 text-white p-4 rounded-xl"><div class="text-2xl font-bold" id="totalLulus">0</div><div>Lulus</div></div>
                    <div class="bg-orange-500 text-white p-4 rounded-xl"><div class="text-2xl font-bold" id="totalProses">0</div><div>Proses</div></div>
                    <div class="bg-red-500 text-white p-4 rounded-xl"><div class="text-2xl font-bold" id="totalBelum">0</div><div>Belum</div></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white p-4 rounded-xl"><canvas id="statusChart" height="200"></canvas></div>
                    <div class="bg-white p-4 rounded-xl"><canvas id="nilaiChart" height="200"></canvas></div>
                </div>
            </div>

            <!-- DATA SANTRI -->
            <div id="pageSantri" class="page hidden">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-bold">Data Santri</h2>
                    <div><button onclick="openModal('tambahModal')" class="btn-primary"><i class="fas fa-plus"></i> Tambah</button></div>
                </div>
                <div class="bg-white rounded-xl shadow-sm mb-4">
                    <div class="p-4"><input type="text" id="searchSantri" placeholder="Cari nama atau kelas..." class="w-full" onkeyup="renderSantri()"></div>
                </div>
                <div id="santriListContainer" class="bg-white rounded-xl shadow-sm overflow-hidden"></div>
            </div>

            <!-- HAFALAN -->
            <div id="pageHafalan" class="page hidden">
                <h2 class="text-2xl font-bold mb-6">Hafalan & Penilaian</h2>
                <div class="bg-white rounded-xl shadow-sm mb-4">
                    <div class="p-4">
                        <input type="text" id="searchHafalanSantri" placeholder="Cari santri..." class="w-full mb-3" onkeyup="renderSantriHafalanList()">
                        <div id="santriHafalanList" class="max-h-64 overflow-y-auto border rounded-lg"></div>
                    </div>
                </div>
                <div id="formHafalan" class="hidden bg-white rounded-xl shadow-sm p-6"></div>
            </div>

            <!-- SERTIFIKAT -->
            <div id="pageSertifikat" class="page hidden">
                <h2 class="text-2xl font-bold mb-6">Sertifikat Kelulusan</h2>
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <select id="selectSertifikat" class="w-full mb-4" onchange="generateSertifikat()"><option value="">-- Pilih Santri Lulus --</option></select>
                    <div id="sertifikatPreview"></div>
                </div>
            </div>

            <!-- PROFIL -->
            <div id="pageProfil" class="page hidden">
                <h2 class="text-2xl font-bold mb-6">Profil Pondok</h2>
                <div class="bg-white rounded-xl shadow-sm p-6 max-w-lg">
                    <div class="mb-4 text-center">
                        <div class="w-24 h-24 mx-auto rounded-full overflow-hidden bg-gray-100 flex items-center justify-center" id="logoPreview">
                            <i class="fas fa-school text-4xl text-gray-400"></i>
                            <img id="logoImg" class="hidden w-full h-full object-cover">
                        </div>
                        <input type="file" id="logoUpload" class="hidden" accept="image/*" onchange="uploadLogo(this)">
                        <button onclick="document.getElementById('logoUpload').click()" class="btn-outline text-sm mt-2">Upload Logo</button>
                    </div>
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">Nama Pesantren</label><input type="text" id="profilNama" class="w-full" value="Pondok Pesantren Bahrul Maghfiroh"></div>
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">Pengasuh</label><input type="text" id="profilPengasuh" class="w-full" placeholder="KH. Nama Pengasuh"></div>
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">Kepala Pondok</label><input type="text" id="profilKapondok" class="w-full" placeholder="Nama Kepala Pondok"></div>
                    <div class="mb-4"><label class="block text-sm font-medium mb-1">Alamat</label><textarea id="profilAlamat" rows="2" class="w-full"></textarea></div>
                    <button onclick="saveProfil()" class="btn-primary w-full"><i class="fas fa-save"></i> Simpan Profil</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL TAMBAH -->
<div id="tambahModal" class="modal hidden" onclick="closeModal(event,'tambahModal')">
    <div class="modal-content p-6" onclick="event.stopPropagation()">
        <h3 class="font-bold text-lg mb-4">Tambah Santri</h3>
        <input type="text" id="tambahNama" placeholder="Nama Lengkap" class="w-full mb-3">
        <select id="tambahKelas" class="w-full mb-4">
            <option value="">Pilih Kelas</option>
            <option>1A</option><option>1B</option><option>2A</option><option>2B</option>
            <option>3A</option><option>3B</option><option>4A</option><option>4B</option>
            <option>5A</option><option>5B</option><option>6A</option><option>6B</option>
        </select>
        <div class="flex gap-3 justify-end">
            <button onclick="closeModal(null,'tambahModal')" class="btn-outline">Batal</button>
            <button onclick="tambahSantri()" class="btn-primary">Simpan</button>
        </div>
    </div>
</div>

<script>
// ==================== DATA ====================
let santri = [];
let currentSantriId = null;
let statusChart = null, nilaiChart = null;
let logoBase64 = null;

let profilData = {
    nama: 'Pondok Pesantren Bahrul Maghfiroh',
    pengasuh: '',
    kapondok: '',
    alamat: ''
};

// Juz 30 list
const juz30List = ['An-Naba','An-Nazi\'at','Abasa','At-Takwir','Al-Infitar','Al-Mutaffifin','Al-Insyiqaq','Al-Buruj','At-Tariq','Al-A\'la','Al-Ghasyiyah','Al-Fajr','Al-Balad','Asy-Syams','Al-Lail','Ad-Duha','Asy-Syarh','At-Tin','Al-Alaq','Al-Qadr','Al-Bayyinah','Az-Zalzalah','Al-Adiyat','Al-Qari\'ah','At-Takasur','Al-Asr','Al-Humazah','Al-Fil','Quraisy','Al-Ma\'un','Al-Kausar','Al-Kafirun','An-Nasr','Al-Lahab','Al-Ikhlas','Al-Falaq','An-Nas'];

function showToast(msg, type = 'success') {
    let toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
}

// Hitung progress - TOTAL 56 item
function getProgress(s) {
    let total = 0, done = 0;
    if (s.hafalan_yasin) done++; total++;
    if (s.hafalan_waqiah) done++; total++;
    if (s.hafalan_mulk) done++; total++;
    if (s.aurad_wirid) done++; total++;
    if (s.aurad_doa) done++; total++;
    if (s.aurad_tahlil_ringkas) done++; total++;
    if (s.aurad_tahlil_lengkap) done++; total++;
    if (s.aurad_doa_tahlil) done++; total++;
    if (s.aurad_tawasul) done++; total++;
    if (s.juz30) { let jd = s.juz30.filter(v=>v===true).length; done += jd; total += 37; }
    if (s.praktik_shalat) done++; total++;
    if (s.praktik_jenazah) done++; total++;
    if (s.praktik_khotib) done++; total++;
    if (s.madin_ula) done++; total++;
    if (s.madin_wustho) done++; total++;
    if (s.sikap_jamaah) done++; total++;
    if (s.sikap_aktif_madin) done++; total++;
    if (s.sikap_aktif_formal) done++; total++;
    return total > 0 ? Math.round((done / total) * 100) : 0;
}

function getStatus(s) {
    let p = getProgress(s);
    if (p >= 100) return 'Lulus';
    if (p >= 30) return 'Proses';
    return 'Belum';
}

function getDefaultSantri() {
    return {
        id: null, nama: '', kelas: '',
        hafalan_yasin: false, hafalan_waqiah: false, hafalan_mulk: false, nilai_hafalan: 'Mumtaz',
        aurad_wirid: false, aurad_doa: false, aurad_tahlil_ringkas: false, aurad_tahlil_lengkap: false, aurad_doa_tahlil: false, aurad_tawasul: false, nilai_aurad: 'Mumtaz',
        juz30: Array(37).fill(false), nilai_juz30: 'Mumtaz',
        praktik_shalat: false, praktik_jenazah: false, praktik_khotib: false, nilai_praktik: 'Mumtaz',
        madin_ula: false, madin_wustho: false,
        sikap_jamaah: false, sikap_aktif_madin: false, sikap_aktif_formal: false
    };
}

// LOAD & SAVE DATA
function loadData() {
    let saved = localStorage.getItem('mutqin_data');
    if (saved) {
        try { santri = JSON.parse(saved); } catch(e) { santri = []; }
    }
    if (!santri.length) {
        santri = [
            { id: 1, nama: 'Ahmad Maulana', kelas: '3A', hafalan_yasin: true, hafalan_waqiah: true, hafalan_mulk: true, aurad_wirid: true, aurad_doa: true, aurad_tahlil_ringkas: true, aurad_tahlil_lengkap: true, aurad_doa_tahlil: true, aurad_tawasul: true, juz30: Array(37).fill(true), praktik_shalat: true, praktik_jenazah: true, praktik_khotib: true, madin_ula: true, madin_wustho: true, sikap_jamaah: true, sikap_aktif_madin: true, sikap_aktif_formal: true, nilai_hafalan: 'Mumtaz', nilai_aurad: 'Mumtaz', nilai_juz30: 'Mumtaz', nilai_praktik: 'Mumtaz' },
            { id: 2, nama: 'Fatimah Azzahra', kelas: '2B', hafalan_yasin: true, nilai_hafalan: 'Jayyid Jiddan' },
            { id: 3, nama: 'Muhammad Rizki', kelas: '1A' }
        ];
    }
    
    let savedProfil = localStorage.getItem('mutqin_profil');
    if (savedProfil) {
        try { let p = JSON.parse(savedProfil); profilData = p; } catch(e) {}
    }
    
    let savedLogo = localStorage.getItem('mutqin_logo');
    if (savedLogo) { logoBase64 = savedLogo; updateLogoDisplay(); }
    
    document.getElementById('profilNama').value = profilData.nama;
    document.getElementById('profilPengasuh').value = profilData.pengasuh || '';
    document.getElementById('profilKapondok').value = profilData.kapondok || '';
    document.getElementById('profilAlamat').value = profilData.alamat || '';
    
    refreshAll();
}

function saveData() {
    localStorage.setItem('mutqin_data', JSON.stringify(santri));
    refreshAll();
}

function saveProfil() {
    profilData = {
        nama: document.getElementById('profilNama').value,
        pengasuh: document.getElementById('profilPengasuh').value,
        kapondok: document.getElementById('profilKapondok').value,
        alamat: document.getElementById('profilAlamat').value
    };
    localStorage.setItem('mutqin_profil', JSON.stringify(profilData));
    showToast('Profil tersimpan');
}

function uploadLogo(input) {
    if (input.files && input.files[0]) {
        let reader = new FileReader();
        reader.onload = function(e) {
            logoBase64 = e.target.result;
            localStorage.setItem('mutqin_logo', logoBase64);
            updateLogoDisplay();
            showToast('Logo tersimpan');
        };
        reader.readAsDataURL(input.files[0]);
    }
}

function updateLogoDisplay() {
    let icon = document.querySelector('#logoPreview i');
    let img = document.getElementById('logoImg');
    if (logoBase64) {
        if (icon) icon.classList.add('hidden');
        img.classList.remove('hidden');
        img.src = logoBase64;
    } else {
        if (icon) icon.classList.remove('hidden');
        img.classList.add('hidden');
    }
}

function refreshAll() {
    updateDashboard();
    renderSantri();
    renderSantriHafalanList();
    updateSertifikatSelect();
}

function updateDashboard() {
    let lulus = 0, proses = 0, belum = 0, mumtaz = 0, jayyidJ = 0, jayyid = 0;
    santri.forEach(s => {
        let st = getStatus(s);
        if (st === 'Lulus') lulus++;
        else if (st === 'Proses') proses++;
        else belum++;
        if (s.nilai_hafalan === 'Mumtaz') mumtaz++;
        else if (s.nilai_hafalan === 'Jayyid Jiddan') jayyidJ++;
        else if (s.nilai_hafalan === 'Jayyid') jayyid++;
    });
    document.getElementById('totalSantri').innerText = santri.length;
    document.getElementById('totalLulus').innerText = lulus;
    document.getElementById('totalProses').innerText = proses;
    document.getElementById('totalBelum').innerText = belum;
    
    if (statusChart) statusChart.destroy();
    if (nilaiChart) nilaiChart.destroy();
    
    let ctx1 = document.getElementById('statusChart')?.getContext('2d');
    if (ctx1) statusChart = new Chart(ctx1, { type: 'doughnut', data: { labels: ['Lulus', 'Proses', 'Belum'], datasets: [{ data: [lulus, proses, belum], backgroundColor: ['#10b981', '#f59e0b', '#ef4444'] }] }, options: { responsive: true } });
    
    let ctx2 = document.getElementById('nilaiChart')?.getContext('2d');
    if (ctx2) nilaiChart = new Chart(ctx2, { type: 'bar', data: { labels: ['Mumtaz', 'Jayyid Jiddan', 'Jayyid'], datasets: [{ label: 'Jumlah', data: [mumtaz, jayyidJ, jayyid], backgroundColor: '#10b981' }] }, options: { responsive: true } });
}

// DATA SANTRI
function tambahSantri() {
    let nama = document.getElementById('tambahNama').value.trim();
    let kelas = document.getElementById('tambahKelas').value;
    if (!nama) { showToast('Nama harus diisi', 'error'); return; }
    if (!kelas) { showToast('Pilih kelas', 'error'); return; }
    let newSantri = getDefaultSantri();
    newSantri.id = Date.now();
    newSantri.nama = nama;
    newSantri.kelas = kelas;
    santri.push(newSantri);
    saveData();
    showToast(`${nama} ditambahkan`);
    closeModal(null, 'tambahModal');
    document.getElementById('tambahNama').value = '';
    document.getElementById('tambahKelas').value = '';
}

function editSantri(id) {
    let s = santri.find(x => x.id === id);
    if (!s) return;
    let newNama = prompt('Edit nama:', s.nama);
    if (newNama && newNama.trim()) {
        s.nama = newNama.trim();
        saveData();
        showToast('Data diupdate');
    }
}

function hapusSantri(id) {
    if (confirm('Hapus santri ini?')) {
        santri = santri.filter(s => s.id !== id);
        saveData();
        showToast('Santri dihapus');
    }
}

function renderSantri() {
    let search = document.getElementById('searchSantri')?.value.toLowerCase() || '';
    let filtered = santri.filter(s => s.nama.toLowerCase().includes(search) || s.kelas.toLowerCase().includes(search));
    let container = document.getElementById('santriListContainer');
    if (!container) return;
    if (filtered.length === 0) { container.innerHTML = '<div class="p-8 text-center text-gray-400">Tidak ada data</div>'; return; }
    
    let grouped = {};
    filtered.forEach(s => { if (!grouped[s.kelas]) grouped[s.kelas] = []; grouped[s.kelas].push(s); });
    
    let html = '';
    for (let kelas in grouped) {
        html += `<div class="border-b"><div class="bg-gray-50 p-3 font-semibold">Kelas ${kelas} (${grouped[kelas].length})</div>`;
        grouped[kelas].forEach(s => {
            let status = getStatus(s), persen = getProgress(s);
            let badgeClass = status === 'Lulus' ? 'badge-success' : (status === 'Proses' ? 'badge-warning' : 'badge-danger');
            html += `<div class="p-3 border-b flex justify-between items-center">
                <div><span class="font-medium">${s.nama}</span>
                <div class="flex items-center gap-2 mt-1"><div class="progress-bar"><div class="progress-fill" style="width:${persen}%"></div></div><span class="text-xs">${persen}%</span></div></div>
                <div class="flex gap-2"><span class="badge ${badgeClass}">${status}</span>
                <button onclick="editSantri(${s.id})" class="text-blue-500"><i class="fas fa-edit"></i></button>
                <button onclick="hapusSantri(${s.id})" class="text-red-500"><i class="fas fa-trash"></i></button></div>
            </div>`;
        });
        html += `</div>`;
    }
    container.innerHTML = html;
}

// HAFALAN
function renderSantriHafalanList() {
    let search = document.getElementById('searchHafalanSantri')?.value.toLowerCase() || '';
    let filtered = santri.filter(s => s.nama.toLowerCase().includes(search) || s.kelas.toLowerCase().includes(search));
    let container = document.getElementById('santriHafalanList');
    if (!container) return;
    if (filtered.length === 0) { container.innerHTML = '<div class="p-4 text-center text-gray-400">Tidak ada santri</div>'; return; }
    
    let html = '';
    filtered.forEach(s => {
        let status = getStatus(s);
        let badgeClass = status === 'Lulus' ? 'badge-success' : (status === 'Proses' ? 'badge-warning' : 'badge-danger');
        html += `<div class="p-3 border-b cursor-pointer hover:bg-gray-50 flex justify-between items-center" onclick="selectSantriHafalan(${s.id})">
            <div><span class="font-medium">${s.nama}</span><span class="text-xs text-gray-400 ml-2">Kelas ${s.kelas}</span></div>
            <span class="badge ${badgeClass}">${status}</span>
        </div>`;
    });
    container.innerHTML = html;
}

function selectSantriHafalan(id) {
    currentSantriId = id;
    loadHafalanForm();
}

function loadHafalanForm() {
    if (!currentSantriId) { document.getElementById('formHafalan').classList.add('hidden'); return; }
    let s = santri.find(x => x.id === currentSantriId);
    if (!s) return;
    
    let kelasNum = parseInt(s.kelas.match(/\d+/)?.[0] || 6);
    
    let juzHtml = '<div class="mb-3 flex justify-between items-center"><span class="font-medium">Centang Semua Juz 30</span><input type="checkbox" id="selectAllJuz30" onchange="checkAllJuz30()" class="w-5 h-5"></div><div class="grid grid-cols-2 md:grid-cols-4 gap-2 max-h-60 overflow-auto p-2 bg-gray-50 rounded-lg">';
    juz30List.forEach((surat, i) => {
        juzHtml += `<label class="flex justify-between items-center p-2 bg-white rounded border text-sm"><span class="truncate">${surat}</span><input type="checkbox" id="juz_cb_${i}" class="w-4 h-4" ${s.juz30 && s.juz30[i] ? 'checked' : ''}></label>`;
    });
    juzHtml += '</div>';
    
    let madinHtml = (kelasNum <= 3) ? `<div><label class="flex justify-between p-3 bg-white rounded-lg border"><span>Lulus Madin Ula</span><input type="checkbox" id="madin_ula" ${s.madin_ula ? 'checked' : ''}></label></div>` : `<div class="grid grid-cols-2 gap-3"><label class="flex justify-between p-3 bg-white rounded-lg border"><span>Madin Ula</span><input type="checkbox" id="madin_ula" ${s.madin_ula ? 'checked' : ''}></label><label class="flex justify-between p-3 bg-white rounded-lg border"><span>Madin Wustho</span><input type="checkbox" id="madin_wustho" ${s.madin_wustho ? 'checked' : ''}></label></div>`;
    
    document.getElementById('formHafalan').classList.remove('hidden');
    document.getElementById('formHafalan').innerHTML = `
        <div class="mb-4 p-3 bg-emerald-50 rounded-lg flex justify-between">
            <div><span class="font-bold">${s.nama}</span> <span class="text-sm text-gray-500">Kelas ${s.kelas}</span></div>
            <span class="text-sm">Progress: ${getProgress(s)}% - ${getStatus(s)}</span>
        </div>
        
        <!-- SURAT -->
        <div class="border rounded-lg p-4 mb-4">
            <div class="flex justify-between mb-3"><h3 class="font-bold">1. Surat Pilihan</h3><button onclick="checkAllSurat()" class="btn-outline text-sm px-3 py-1">Centang Semua</button></div>
            <div class="grid grid-cols-3 gap-3"><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Yasin</span><input type="checkbox" id="hafalan_yasin" ${s.hafalan_yasin ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Al-Waqiah</span><input type="checkbox" id="hafalan_waqiah" ${s.hafalan_waqiah ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Al-Mulk</span><input type="checkbox" id="hafalan_mulk" ${s.hafalan_mulk ? 'checked' : ''}></label></div>
            <div class="mt-3 flex gap-3"><select id="nilai_hafalan" class="flex-1"><option ${s.nilai_hafalan === 'Mumtaz' ? 'selected' : ''}>Mumtaz</option><option ${s.nilai_hafalan === 'Jayyid Jiddan' ? 'selected' : ''}>Jayyid Jiddan</option><option ${s.nilai_hafalan === 'Jayyid' ? 'selected' : ''}>Jayyid</option></select><button onclick="simpanKategori('surat')" class="btn-primary px-4">Simpan</button></div>
        </div>
        
        <!-- AURAD -->
        <div class="border rounded-lg p-4 mb-4">
            <div class="flex justify-between mb-3"><h3 class="font-bold">2. Aurad & Wirid</h3><button onclick="checkAllAurad()" class="btn-outline text-sm px-3 py-1">Centang Semua</button></div>
            <div class="grid grid-cols-2 gap-2"><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Wirid</span><input type="checkbox" id="aurad_wirid" ${s.aurad_wirid ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Doa Shalat</span><input type="checkbox" id="aurad_doa" ${s.aurad_doa ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Tahlil Ringkas</span><input type="checkbox" id="aurad_tahlil_ringkas" ${s.aurad_tahlil_ringkas ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Tahlil Lengkap</span><input type="checkbox" id="aurad_tahlil_lengkap" ${s.aurad_tahlil_lengkap ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Doa Tahlil</span><input type="checkbox" id="aurad_doa_tahlil" ${s.aurad_doa_tahlil ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Tawasul</span><input type="checkbox" id="aurad_tawasul" ${s.aurad_tawasul ? 'checked' : ''}></label></div>
            <div class="mt-3 flex gap-3"><select id="nilai_aurad" class="flex-1"><option ${s.nilai_aurad === 'Mumtaz' ? 'selected' : ''}>Mumtaz</option><option ${s.nilai_aurad === 'Jayyid Jiddan' ? 'selected' : ''}>Jayyid Jiddan</option><option ${s.nilai_aurad === 'Jayyid' ? 'selected' : ''}>Jayyid</option></select><button onclick="simpanKategori('aurad')" class="btn-primary px-4">Simpan</button></div>
        </div>
        
        <!-- JUZ 30 -->
        <div class="border rounded-lg p-4 mb-4">${juzHtml}<div class="mt-3 flex gap-3"><select id="nilai_juz30" class="flex-1"><option ${s.nilai_juz30 === 'Mumtaz' ? 'selected' : ''}>Mumtaz</option><option ${s.nilai_juz30 === 'Jayyid Jiddan' ? 'selected' : ''}>Jayyid Jiddan</option><option ${s.nilai_juz30 === 'Jayyid' ? 'selected' : ''}>Jayyid</option></select><button onclick="simpanKategori('juz30')" class="btn-primary px-4">Simpan</button></div></div>
        
        <!-- PRAKTIK -->
        <div class="border rounded-lg p-4 mb-4">
            <div class="flex justify-between mb-3"><h3 class="font-bold">3. Praktik Ibadah</h3><button onclick="checkAllPraktik()" class="btn-outline text-sm px-3 py-1">Centang Semua</button></div>
            <div class="grid grid-cols-3 gap-2"><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Shalat</span><input type="checkbox" id="praktik_shalat" ${s.praktik_shalat ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Jenazah</span><input type="checkbox" id="praktik_jenazah" ${s.praktik_jenazah ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Khotib</span><input type="checkbox" id="praktik_khotib" ${s.praktik_khotib ? 'checked' : ''}></label></div>
            <div class="mt-3 flex gap-3"><select id="nilai_praktik" class="flex-1"><option ${s.nilai_praktik === 'Mumtaz' ? 'selected' : ''}>Mumtaz</option><option ${s.nilai_praktik === 'Jayyid Jiddan' ? 'selected' : ''}>Jayyid Jiddan</option><option ${s.nilai_praktik === 'Jayyid' ? 'selected' : ''}>Jayyid</option></select><button onclick="simpanKategori('praktik')" class="btn-primary px-4">Simpan</button></div>
        </div>
        
        <!-- MADIN -->
        <div class="border rounded-lg p-4 mb-4">
            <h3 class="font-bold mb-3">4. Pendidikan Madin</h3>
            ${madinHtml}
            <div class="mt-3"><button onclick="simpanKategori('madin')" class="btn-primary px-4">Simpan</button></div>
        </div>
        
        <!-- SIKAP -->
        <div class="border rounded-lg p-4 mb-4">
            <div class="flex justify-between mb-3"><h3 class="font-bold">5. Sikap & Adab</h3><button onclick="checkAllSikap()" class="btn-outline text-sm px-3 py-1">Centang Semua</button></div>
            <div class="grid grid-cols-1 gap-2"><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Shalat berjamaah</span><input type="checkbox" id="sikap_jamaah" ${s.sikap_jamaah ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Keaktifan Madin</span><input type="checkbox" id="sikap_aktif_madin" ${s.sikap_aktif_madin ? 'checked' : ''}></label><label class="flex justify-between p-2 bg-gray-50 rounded"><span>Keaktifan Formal</span><input type="checkbox" id="sikap_aktif_formal" ${s.sikap_aktif_formal ? 'checked' : ''}></label></div>
            <div class="mt-3"><button onclick="simpanKategori('sikap')" class="btn-primary px-4">Simpan</button></div>
        </div>
    `;
}

function simpanKategori(kategori) {
    if (!currentSantriId) return;
    let idx = santri.findIndex(x => x.id === currentSantriId);
    if (idx === -1) return;
    
    if (kategori === 'surat') {
        santri[idx].hafalan_yasin = document.getElementById('hafalan_yasin')?.checked || false;
        santri[idx].hafalan_waqiah = document.getElementById('hafalan_waqiah')?.checked || false;
        santri[idx].hafalan_mulk = document.getElementById('hafalan_mulk')?.checked || false;
        santri[idx].nilai_hafalan = document.getElementById('nilai_hafalan')?.value || 'Mumtaz';
    } else if (kategori === 'aurad') {
        santri[idx].aurad_wirid = document.getElementById('aurad_wirid')?.checked || false;
        santri[idx].aurad_doa = document.getElementById('aurad_doa')?.checked || false;
        santri[idx].aurad_tahlil_ringkas = document.getElementById('aurad_tahlil_ringkas')?.checked || false;
        santri[idx].aurad_tahlil_lengkap = document.getElementById('aurad_tahlil_lengkap')?.checked || false;
        santri[idx].aurad_doa_tahlil = document.getElementById('aurad_doa_tahlil')?.checked || false;
        santri[idx].aurad_tawasul = document.getElementById('aurad_tawasul')?.checked || false;
        santri[idx].nilai_aurad = document.getElementById('nilai_aurad')?.value || 'Mumtaz';
    } else if (kategori === 'juz30') {
        let juzArr = [];
        for (let i = 0; i < 37; i++) { juzArr.push(document.getElementById(`juz_cb_${i}`)?.checked || false); }
        santri[idx].juz30 = juzArr;
        santri[idx].nilai_juz30 = document.getElementById('nilai_juz30')?.value || 'Mumtaz';
    } else if (kategori === 'praktik') {
        santri[idx].praktik_shalat = document.getElementById('praktik_shalat')?.checked || false;
        santri[idx].praktik_jenazah = document.getElementById('praktik_jenazah')?.checked || false;
        santri[idx].praktik_khotib = document.getElementById('praktik_khotib')?.checked || false;
        santri[idx].nilai_praktik = document.getElementById('nilai_praktik')?.value || 'Mumtaz';
    } else if (kategori === 'madin') {
        santri[idx].madin_ula = document.getElementById('madin_ula')?.checked || false;
        santri[idx].madin_wustho = document.getElementById('madin_wustho')?.checked || false;
    } else if (kategori === 'sikap') {
        santri[idx].sikap_jamaah = document.getElementById('sikap_jamaah')?.checked || false;
        santri[idx].sikap_aktif_madin = document.getElementById('sikap_aktif_madin')?.checked || false;
        santri[idx].sikap_aktif_formal = document.getElementById('sikap_aktif_formal')?.checked || false;
    }
    saveData();
    showToast(`${kategori} tersimpan`);
    loadHafalanForm(); // Refresh form dengan data terbaru, tetap di santri yang sama
}

function checkAllSurat() {
    let cbs = ['hafalan_yasin', 'hafalan_waqiah', 'hafalan_mulk'];
    let allChecked = cbs.every(id => document.getElementById(id)?.checked);
    cbs.forEach(id => { let cb = document.getElementById(id); if (cb) cb.checked = !allChecked; });
}

function checkAllAurad() {
    let cbs = ['aurad_wirid', 'aurad_doa', 'aurad_tahlil_ringkas', 'aurad_tahlil_lengkap', 'aurad_doa_tahlil', 'aurad_tawasul'];
    let allChecked = cbs.every(id => document.getElementById(id)?.checked);
    cbs.forEach(id => { let cb = document.getElementById(id); if (cb) cb.checked = !allChecked; });
}

function checkAllJuz30() {
    let selectAll = document.getElementById('selectAllJuz30');
    if (!selectAll) return;
    for (let i = 0; i < 37; i++) { let cb = document.getElementById(`juz_cb_${i}`); if (cb) cb.checked = selectAll.checked; }
}

function checkAllPraktik() {
    let cbs = ['praktik_shalat', 'praktik_jenazah', 'praktik_khotib'];
    let allChecked = cbs.every(id => document.getElementById(id)?.checked);
    cbs.forEach(id => { let cb = document.getElementById(id); if (cb) cb.checked = !allChecked; });
}

function checkAllSikap() {
    let cbs = ['sikap_jamaah', 'sikap_aktif_madin', 'sikap_aktif_formal'];
    let allChecked = cbs.every(id => document.getElementById(id)?.checked);
    cbs.forEach(id => { let cb = document.getElementById(id); if (cb) cb.checked = !allChecked; });
}

// SERTIFIKAT
function updateSertifikatSelect() {
    let select = document.getElementById('selectSertifikat');
    if (select) {
        let lulusan = santri.filter(s => getStatus(s) === 'Lulus');
        select.innerHTML = '<option value="">-- Pilih Santri Lulus --</option>' + lulusan.map(s => `<option value="${s.id}">${s.nama} (Kelas ${s.kelas})</option>`).join('');
    }
}

function generateSertifikat() {
    let id = document.getElementById('selectSertifikat').value;
    if (!id) { document.getElementById('sertifikatPreview').innerHTML = ''; return; }
    let s = santri.find(x => x.id == parseInt(id));
    if (!s || getStatus(s) !== 'Lulus') { showToast('Pilih santri LULUS', 'error'); return; }
    
    let today = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'long', year: 'numeric' });
    let logoHtml = logoBase64 ? `<img src="${logoBase64}" class="w-16 h-16 mx-auto mb-3 rounded-full object-cover">` : '<i class="fas fa-graduation-cap text-emerald-600 text-5xl mb-3"></i>';
    
    document.getElementById('sertifikatPreview').innerHTML = `
        <div class="text-center border-4 border-emerald-700 rounded-2xl p-8 bg-white max-w-md mx-auto">
            ${logoHtml}
            <h2 class="text-xl font-bold">${profilData.nama}</h2>
            <div class="border-b-2 border-emerald-600 w-24 mx-auto my-3"></div>
            <p class="text-sm">SERTIFIKAT KELULUSAN</p>
            <p class="text-xs text-gray-500 mt-3">Diberikan kepada:</p>
            <h3 class="text-2xl font-bold text-emerald-700 my-2">${s.nama}</h3>
            <p class="text-sm">Telah menyelesaikan pendidikan di</p>
            <p class="font-semibold">${profilData.nama}</p>
            <div class="inline-block bg-emerald-100 px-6 py-1 rounded-full my-4"><span class="font-bold">LULUS</span></div>
            <p class="text-xs">Malang, ${today}</p>
            <div class="grid grid-cols-2 gap-4 mt-4 pt-3 border-t">
                <div><div class="border-t-2 border-gray-300 pt-1 text-xs">Pengasuh</div><div class="text-xs font-semibold">${profilData.pengasuh || '________'}</div></div>
                <div><div class="border-t-2 border-gray-300 pt-1 text-xs">Kepala Pondok</div><div class="text-xs font-semibold">${profilData.kapondok || '________'}</div></div>
            </div>
        </div>
        <div class="text-center mt-4"><button onclick="downloadSertifikat()" class="btn-primary"><i class="fas fa-download"></i> Download Sertifikat</button></div>
    `;
}

function downloadSertifikat() {
    let node = document.querySelector('#sertifikatPreview .border-4');
    if (!node) return;
    html2canvas(node, { scale: 2 }).then(canvas => {
        let link = document.createElement('a');
        link.download = 'sertifikat.png';
        link.href = canvas.toDataURL();
        link.click();
        showToast('Sertifikat terunduh');
    }).catch(() => showToast('Gagal download', 'error'));
}

// NAVIGATION
function showPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
    if (window.event && window.event.currentTarget) window.event.currentTarget.classList.add('active');
    if (page === 'santri') renderSantri();
    if (page === 'dashboard') updateDashboard();
    if (page === 'sertifikat') updateSertifikatSelect();
}

function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.body.style.overflow = 'hidden'; }
function closeModal(event, id) { if (!event || event.target === document.getElementById(id)) { document.getElementById(id).classList.add('hidden'); document.body.style.overflow = 'auto'; } }

// LOGIN
function doLogin() {
    let u = document.getElementById('loginUser').value;
    let p = document.getElementById('loginPass').value;
    if ((u === 'admin' && p === 'admin123') || (u === 'guru' && p === 'guru123')) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('userRole').innerHTML = u === 'admin' ? 'Administrator' : 'Guru';
        loadData();
        showToast('Selamat datang!');
    } else {
        showToast('Username/Password salah!', 'error');
    }
}

function doLogout() {
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
}

// INIT
loadData();
</script>
</body>
</html>
