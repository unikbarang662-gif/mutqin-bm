<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mutqin BM - Sistem Kelulusan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { background: #e8f5e9; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a472a; }
        .navbar-brand, .nav-link { color: white !important; }
        .card { border-radius: 20px; margin-bottom: 20px; }
        .card-header { background: #2d6a4f; color: white; border-radius: 20px 20px 0 0; }
        .btn-mutqin { background: #2d6a4f; color: white; border-radius: 40px; }
        .stat-card { background: white; border-radius: 20px; padding: 20px; text-align: center; }
        .login-card { max-width: 400px; margin: auto; background: white; border-radius: 30px; overflow: hidden; }
        .logo-area { background: #2d6a4f; color: #ffd966; padding: 30px; text-align: center; }
        .progress { height: 25px; border-radius: 20px; }
        .sertifikat { background: #fef7e0; border: 15px solid #b8860b; border-radius: 20px; padding: 30px; font-family: 'Times New Roman'; }
        .footer { background: #1a472a; color: white; text-align: center; padding: 15px; margin-top: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-mortarboard-fill"></i> Mutqin BM</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto" id="navMenu"></ul>
        </div>
    </div>
</nav>

<div class="container mt-4" id="app"></div>

<div class="footer">© 2026 Mutqin BM - Ponpes Bahrul Maghfiroh</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
// DATA
let user = null;
let santri = [
    { id:1, nis:"001", nama:"Ahmad Fauzan", kelas:"Kelas 5", wali:"Bapak Ahmad", progress:94, lulus:true },
    { id:2, nis:"002", nama:"Salma Azizah", kelas:"Kelas 4", wali:"Ibu Salma", progress:68, lulus:false },
    { id:3, nis:"003", nama:"Mohammad Luqman", kelas:"Kelas 2", wali:"Bapak Luqman", progress:45, lulus:false },
    { id:4, nis:"004", nama:"Yusuf Ramadhan", kelas:"Kelas 6", wali:"Bapak Yusuf", progress:30, lulus:false },
    { id:5, nis:"005", nama:"M. Faris", kelas:"Kelas 5", wali:"Ibu Faris", progress:72, lulus:false },
    { id:6, nis:"006", nama:"Waisin", kelas:"Kelas 3", wali:"-", progress:51, lulus:false },
    { id:7, nis:"007", nama:"Magilah", kelas:"Kelas 3", wali:"-", progress:51, lulus:false },
    { id:8, nis:"008", nama:"Monalisa", kelas:"Kelas 4", wali:"-", progress:51, lulus:false }
];

let hafalan = {};
santri.forEach(s => { hafalan[s.id] = { yasin: s.id==1, waqiah: s.id==1, mulk: s.id==1, aurad: s.id==1?"Mumtaz":"Jayyid", juz30: s.id==1?"Ahsan":"Jayyid", madin: s.id==1, adab: s.id==1 }; });

function save() { localStorage.setItem('santri', JSON.stringify(santri)); localStorage.setItem('hafalan', JSON.stringify(hafalan)); }
function load() {
    if(localStorage.getItem('santri')) santri = JSON.parse(localStorage.getItem('santri'));
    if(localStorage.getItem('hafalan')) hafalan = JSON.parse(localStorage.getItem('hafalan'));
}
load();

function updateProgress() {
    santri.forEach(s => {
        let h = hafalan[s.id];
        let prog = 0;
        if(h.yasin) prog += 15;
        if(h.waqiah) prog += 15;
        if(h.mulk) prog += 15;
        if(h.aurad == "Mumtaz") prog += 15;
        else if(h.aurad == "Jayyid Jiddan") prog += 12;
        else if(h.aurad == "Jayyid") prog += 10;
        if(h.juz30 == "Mumtaz") prog += 15;
        else if(h.juz30 == "Ahsan") prog += 13;
        else if(h.juz30 == "Jayyid Jiddan") prog += 11;
        else if(h.juz30 == "Jayyid") prog += 9;
        if(h.madin) prog += 10;
        if(h.adab) prog += 10;
        s.progress = Math.min(100, prog);
        s.lulus = s.progress >= 75;
    });
    save();
}

let page = 'login';
let chart;

function render() {
    let html = '';
    if(page == 'login') {
        html = `
            <div class="row justify-content-center mt-5">
                <div class="col-md-5">
                    <div class="login-card">
                        <div class="logo-area">
                            <h3>PONDOK PESANTREN</h3>
                            <h1>BAHRUL MAGHFIROH</h1>
                            <hr>
                            <h1>Mutqin BM</h1>
                            <p>Standar Kelulusan</p>
                        </div>
                        <div class="p-4">
                            <h5 class="text-center">Login</h5>
                            <input type="text" id="username" class="form-control mb-2" placeholder="Username">
                            <input type="password" id="password" class="form-control mb-3" placeholder="Password">
                            <button class="btn btn-mutqin w-100" onclick="login()">Login</button>
                            <div class="text-center mt-2 small">admin/admin | ustadz/ustadz</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    } else if(page == 'dashboard') {
        updateProgress();
        let total = santri.length;
        let lulus = santri.filter(s=>s.lulus).length;
        let proses = santri.filter(s=>!s.lulus && s.progress>40).length;
        let belum = santri.filter(s=>s.progress<=40).length;
        let top5 = [...santri].sort((a,b)=>b.progress-a.progress).slice(0,5);
        
        html = `
            <div class="row g-3 mb-4">
                <div class="col-md-3 col-6"><div class="stat-card"><i class="bi bi-people fs-1"></i><h2>${total}</h2><p>Total Santri</p></div></div>
                <div class="col-md-3 col-6"><div class="stat-card bg-success text-white"><i class="bi bi-check-circle fs-1"></i><h2>${lulus}</h2><p>Sudah Lulus</p></div></div>
                <div class="col-md-3 col-6"><div class="stat-card bg-warning"><i class="bi bi-hourglass fs-1"></i><h2>${proses}</h2><p>Proses</p></div></div>
                <div class="col-md-3 col-6"><div class="stat-card bg-secondary text-white"><i class="bi bi-clock fs-1"></i><h2>${belum}</h2><p>Belum Lulus</p></div></div>
            </div>
            <div class="row">
                <div class="col-md-6"><div class="card"><div class="card-header">Progress Hafalan</div><div class="card-body"><canvas id="progressChart"></canvas></div></div></div>
                <div class="col-md-6"><div class="card"><div class="card-header">Status Kelulusan</div><div class="card-body"><canvas id="statusChart"></canvas></div></div></div>
            </div>
            <div class="card"><div class="card-header">Rekap Santri</div><div class="card-body table-responsive"><table class="table table-bordered"><thead class="table-success"><tr><th>Nama</th><th>Kelas</th><th>Progress</th><th>Status</th></tr></thead><tbody>
                ${santri.map(s => `<tr><td>${s.nama}</td><td>${s.kelas}</td><td><div class="progress"><div class="progress-bar" style="width:${s.progress}%">${s.progress}%</div></div></td><td>${s.lulus ? '<span class="badge bg-success">LULUS</span>' : '<span class="badge bg-warning">PROSES</span>'}</td></tr>`).join('')}
            </tbody></table></div></div>
        `;
        setTimeout(() => {
            if(chart) chart.destroy();
            let ctx = document.getElementById('progressChart')?.getContext('2d');
            if(ctx) chart = new Chart(ctx, { type: 'bar', data: { labels: top5.map(s=>s.nama), datasets: [{ label: 'Progress', data: top5.map(s=>s.progress), backgroundColor: '#2d6a4f' }] } });
        }, 100);
    } else if(page == 'santri') {
        html = `
            <div class="card"><div class="card-header">Data Santri <button class="btn btn-sm btn-light float-end" onclick="tambah()">+ Tambah</button></div>
            <div class="card-body table-responsive"><table class="table table-bordered"><thead class="table-success"><tr><th>NIS</th><th>Nama</th><th>Kelas</th><th>Progress</th><th>Status</th><th>Aksi</th></tr></thead><tbody>
                ${santri.map(s => `<tr><td>${s.nis}</td><td>${s.nama}</td><td>${s.kelas}</td><td><div class="progress" style="height:20px"><div class="progress-bar" style="width:${s.progress}%">${s.progress}%</div></div></td><td>${s.lulus ? 'Lulus' : 'Proses'}</td><td><button class="btn btn-sm btn-primary" onclick="edit(${s.id})">Edit</button> <button class="btn btn-sm btn-danger" onclick="hapus(${s.id})">Hapus</button></td></tr>`).join('')}
            </tbody></table></div></div>
        `;
    } else if(page == 'hafalan') {
        html = `
            <div class="card"><div class="card-header">Input Hafalan</div>
            <div class="card-body">
                <select id="pilihSantri" class="form-select mb-3" onchange="loadHafalan(this.value)"><option value="">Pilih Santri</option>${santri.map(s=>`<option value="${s.id}">${s.nama}</option>`).join('')}</select>
                <div id="formHafalan"></div>
            </div></div>
        `;
    } else if(page == 'sertifikat') {
        html = `
            <div class="card"><div class="card-header">Cetak Sertifikat</div>
            <div class="card-body">
                <select id="pilihSertif" class="form-select mb-3"><option value="">Pilih Santri Lulus</option>${santri.filter(s=>s.lulus).map(s=>`<option value="${s.id}">${s.nama}</option>`).join('')}</select>
                <button class="btn btn-mutqin w-100" onclick="cetak()">Cetak PDF</button>
                <div id="preview" class="sertifikat mt-4 text-center"></div>
            </div></div>
        `;
    }
    
    document.getElementById('app').innerHTML = html;
    
    let nav = document.getElementById('navMenu');
    if(user) {
        nav.innerHTML = `
            <li class="nav-item"><a class="nav-link" href="#" onclick="page='dashboard';render()">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="page='santri';render()">Santri</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="page='hafalan';render()">Hafalan</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="page='sertifikat';render()">Sertifikat</a></li>
            <li class="nav-item"><a class="nav-link text-danger" href="#" onclick="user=null;page='login';render()">Logout</a></li>
        `;
    } else {
        nav.innerHTML = '';
    }
}

function login() {
    let u = document.getElementById('username').value;
    let p = document.getElementById('password').value;
    if((u=='admin' && p=='admin') || (u=='ustadz' && p=='ustadz')) {
        user = { username: u };
        page = 'dashboard';
        render();
    } else { alert("Login gagal!"); }
}

function tambah() {
    let nama = prompt("Nama:");
    if(!nama) return;
    let kelas = prompt("Kelas:");
    let newId = Math.max(...santri.map(s=>s.id),0)+1;
    santri.push({ id:newId, nis:"BM"+newId, nama, kelas, wali:"-", progress:0, lulus:false });
    hafalan[newId] = { yasin:false, waqiah:false, mulk:false, aurad:"Jayyid", juz30:"Jayyid", madin:false, adab:false };
    save();
    render();
}

function hapus(id) {
    if(confirm("Hapus?")) {
        santri = santri.filter(s=>s.id!==id);
        delete hafalan[id];
        save();
        render();
    }
}

function edit(id) {
    let s = santri.find(s=>s.id==id);
    let h = hafalan[id];
    let html = `
        <div class="modal fade" id="modalEdit" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header bg-success text-white"><h5>Edit ${s.nama}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
                    <div class="modal-body">
                        <label><input type="checkbox" id="yasin" ${h.yasin?'checked':''}> Yasin Selesai</label><br>
                        <label><input type="checkbox" id="waqiah" ${h.waqiah?'checked':''}> Al Waqiah</label><br>
                        <label><input type="checkbox" id="mulk" ${h.mulk?'checked':''}> Al Mulk</label><br>
                        <label>Aurad: <select id="aurad"><option ${h.aurad=='Mumtaz'?'selected':''}>Mumtaz</option><option ${h.aurad=='Jayyid'?'selected':''}>Jayyid</option></select></label><br>
                        <label>Juz 30: <select id="juz"><option ${h.juz30=='Ahsan'?'selected':''}>Ahsan</option><option ${h.juz30=='Jayyid'?'selected':''}>Jayyid</option></select></label><br>
                        <label><input type="checkbox" id="madin" ${h.madin?'checked':''}> Lulus Madin</label><br>
                        <label><input type="checkbox" id="adab" ${h.adab?'checked':''}> Adab</label>
                    </div>
                    <div class="modal-footer"><button class="btn btn-primary" onclick="simpanEdit(${id})">Simpan</button><button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button></div>
                </div>
            </div>
        </div>
    `;
    let div = document.createElement('div');
    div.innerHTML = html;
    document.body.appendChild(div);
    let modal = new bootstrap.Modal(div.querySelector('.modal'));
    modal.show();
    div.addEventListener('hidden.bs.modal', () => div.remove());
    window.simpanEdit = function(sid) {
        hafalan[sid].yasin = document.getElementById('yasin').checked;
        hafalan[sid].waqiah = document.getElementById('waqiah').checked;
        hafalan[sid].mulk = document.getElementById('mulk').checked;
        hafalan[sid].aurad = document.getElementById('aurad').value;
        hafalan[sid].juz30 = document.getElementById('juz').value;
        hafalan[sid].madin = document.getElementById('madin').checked;
        hafalan[sid].adab = document.getElementById('adab').checked;
        updateProgress();
        save();
        modal.hide();
        render();
    };
}

function loadHafalan(id) {
    if(!id) return;
    let h = hafalan[id];
    document.getElementById('formHafalan').innerHTML = `
        <div class="alert alert-info">
            <label><input type="checkbox" id="hf_yasin" ${h.yasin?'checked':''}> Yasin Selesai</label><br>
            <label><input type="checkbox" id="hf_waqiah" ${h.waqiah?'checked':''}> Al Waqiah</label><br>
            <label><input type="checkbox" id="hf_mulk" ${h.mulk?'checked':''}> Al Mulk</label><br>
            <label>Aurad: <select id="hf_aurad"><option ${h.aurad=='Mumtaz'?'selected':''}>Mumtaz</option><option ${h.aurad=='Jayyid'?'selected':''}>Jayyid</option></select></label><br>
            <label>Juz 30: <select id="hf_juz"><option ${h.juz30=='Ahsan'?'selected':''}>Ahsan</option><option ${h.juz30=='Jayyid'?'selected':''}>Jayyid</option></select></label><br>
            <label><input type="checkbox" id="hf_madin" ${h.madin?'checked':''}> Lulus Madin</label><br>
            <label><input type="checkbox" id="hf_adab" ${h.adab?'checked':''}> Adab</label><br>
            <button class="btn btn-mutqin mt-2" onclick="simpanHafalan(${id})">Simpan</button>
        </div>
    `;
}

function simpanHafalan(id) {
    hafalan[id].yasin = document.getElementById('hf_yasin').checked;
    hafalan[id].waqiah = document.getElementById('hf_waqiah').checked;
    hafalan[id].mulk = document.getElementById('hf_mulk').checked;
    hafalan[id].aurad = document.getElementById('hf_aurad').value;
    hafalan[id].juz30 = document.getElementById('hf_juz').value;
    hafalan[id].madin = document.getElementById('hf_madin').checked;
    hafalan[id].adab = document.getElementById('hf_adab').checked;
    updateProgress();
    save();
    alert("Tersimpan!");
    page='hafalan';
    render();
}

function cetak() {
    let id = document.getElementById('pilihSertif').value;
    if(!id) { alert("Pilih santri"); return; }
    let s = santri.find(s=>s.id==parseInt(id));
    let h = hafalan[s.id];
    let win = window.open();
    win.document.write(`
        <div style="background:#fef7e0; border:15px solid #b8860b; padding:30px; font-family:'Times New Roman'; text-align:center;">
            <h2 style="color:#2d6a4f;">PONDOK PESANTREN BAHRUL MAGHFIROH</h2>
            <h1 style="color:#b8860b;">SERTIFIKAT KELULUSAN</h1>
            <h3>Program Mutqin BM</h3>
            <hr>
            <h1 style="font-size:48px;">${s.nama}</h1>
            <h2 style="color:green;">LULUS</h2>
            <table style="width:100%; margin:20px 0;" border="1">
                <tr><th>Kriteria</th><th>Nilai</th></tr>
                <tr><td>Hafal Surat Yasin, Waqiah, Al Mulk</td><td>${h.yasin&&h.waqiah&&h.mulk?'Mumtaz':'Belum'}</td></tr>
                <tr><td>Hafal Tawasul, Tahlil, Istighosah</td><td>${h.aurad}</td></tr>
                <tr><td>Praktik Sholat & Pengurusan Jenazah</td><td>Jayyid</td></tr>
                <tr><td>Hafal Juz 30</td><td>${h.juz30}</td></tr>
                <tr><td>Lulus Madin Ula & Wustho</td><td>${h.madin?'✔ Lulus':'✖'}</td></tr>
                <tr><td>Sikap & Adab</td><td>${h.adab?'✔ Baik':'✖'}</td></tr>
            </table>
            <div style="margin-top:40px; display:flex; justify-content:space-between;">
                <div>Pengasuh,<br><br><u>Ust. Drs. H. Abbul Malik</u></div>
                <div>Ketua Tahfizh,<br><br><u>Ust. H. Muhammad Amin</u></div>
            </div>
            <div style="margin-top:20px;">No: BM/${s.id}/2026</div>
        </div>
    `);
    win.document.close();
    win.print();
}

render();
</script>
</body>
</html>
